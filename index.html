<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>RutaExpress · Panel Admin</title>
<link rel="icon" href="data:,">
<style>
  :root{
    --bg:#F2F4F7;--card:#FFFFFF;--border:#E2E8F0;--accent:#2563EB;--onAccent:#fff;
    --green:#22C55E;--red:#EF4444;--orange:#FF8A00;--blue:#2563EB;--indigo:#6366F1;--amber:#F59E0B;
    --tPrimary:#1E293B;--tSecondary:#64748B;--tMuted:#94A3B8;--muted:#E2E8F0;
    --sidebar:#0F172A;--sidebarHover:#1E293B;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--tPrimary);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding-bottom:env(safe-area-inset-bottom)}
  h1,h2,h3,p{margin:0}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  img{display:block}
  .hidden{display:none!important}

  /* Login */
  #login{min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;padding:32px;text-align:center}
  #login .iconBox{width:80px;height:80px;background:var(--card);border-radius:24px;
    display:flex;align-items:center;justify-content:center;font-size:40px}
  #login h1{font-size:28px;font-weight:900}
  #login .sub{font-size:12px;color:var(--tSecondary);letter-spacing:2px}
  #login input{width:100%;max-width:340px;background:var(--card);border:1.5px solid var(--border);
    border-radius:14px;padding:15px;font-size:15px;color:var(--tPrimary)}
  #login button{width:100%;max-width:340px;background:var(--accent);color:#fff;border-radius:14px;
    padding:16px;font-size:16px;font-weight:800}
  #login button:disabled{background:var(--muted)}
  #login .hint{font-size:11px;color:var(--tMuted)}

  /* Layout */
  .layout{display:flex;min-height:100vh}
  .sidebar{width:240px;background:var(--sidebar);color:#CBD5E1;display:flex;flex-direction:column;
    position:fixed;top:0;left:0;bottom:0;z-index:40;transition:transform .25s ease;overflow-y:auto}
  .sidebar .sbBrand{display:flex;align-items:center;gap:10px;padding:20px 18px 16px}
  .sidebar .logo{width:36px;height:36px;border-radius:10px;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px}
  .sidebar .name{font-size:16px;font-weight:800;color:#fff}
  .sidebar .tag{font-size:10px;color:#64748B;letter-spacing:.5px}
  .nav{flex:1;padding:6px 0}
  .navItem{display:flex;align-items:center;gap:12px;padding:10px 14px;margin:2px 10px;border-radius:10px;
    color:#94A3B8;font-size:14px;font-weight:600;width:calc(100% - 20px);text-align:left}
  .navItem .ic{width:20px;text-align:center;font-size:16px}
  .navItem:hover{background:var(--sidebarHover);color:#fff}
  .navItem.active{background:var(--accent);color:#fff}
  .navItem.soon{opacity:.45;cursor:default}
  .navItem.soon:hover{background:none;color:#94A3B8}
  .navBadge{margin-left:auto;background:var(--orange);color:#fff;border-radius:9px;min-width:18px;
    height:18px;padding:0 5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
  .soonTag{margin-left:auto;font-size:9px;color:#475569;border:1px solid #334155;border-radius:6px;padding:1px 5px}
  .sbUser{display:flex;align-items:center;gap:10px;padding:14px 16px;border-top:1px solid #1E293B}
  .sbUser .av{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800}
  .sbUser .un{font-size:13px;font-weight:700;color:#fff}
  .sbUser .ur{font-size:11px;color:#64748B}
  .sbUser .out{margin-left:auto;color:#94A3B8;font-size:18px;padding:4px}

  .main{flex:1;margin-left:240px;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 24px 8px}
  .topbar h2{font-size:20px;font-weight:800}
  .topbar .sub{font-size:12px;color:var(--tSecondary);margin-top:2px}
  .hamb{display:none;width:40px;height:40px;border-radius:10px;background:var(--card);
    border:1px solid var(--border);align-items:center;justify-content:center;font-size:18px}
  .dateChip{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
    border-radius:12px;padding:9px 14px;font-size:13px;color:var(--tSecondary);font-weight:600}
  .content{padding:14px 24px 48px;display:flex;flex-direction:column;gap:18px}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}
  .overlay.show{display:block}

  .sectionTitle{font-size:12px;font-weight:800;color:var(--tMuted);text-transform:uppercase;
    letter-spacing:.6px;margin:6px 0 2px}

  /* KPIs */
  .kpiGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .kpiCard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;
    display:flex;align-items:flex-start;gap:14px}
  .kpiIcon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;
    font-size:22px;flex-shrink:0}
  .kpiLbl{font-size:12px;color:var(--tSecondary);font-weight:600}
  .kpiVal{font-size:24px;font-weight:900;line-height:1.15;margin-top:2px}
  .kpiDelta{font-size:11px;font-weight:700;margin-top:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .kpiDelta.up{color:#16A34A}
  .kpiDelta.down{color:var(--red)}
  .kpiDelta.muted{color:var(--tMuted);font-weight:600}
  .kpiDelta span{color:var(--tMuted);font-weight:500}

  /* Panels / dashboard grid */
  .dashGrid{display:grid;grid-template-columns:2fr 1fr;gap:16px}
  .dashGrid2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
  .panelHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .panelTitle{font-size:15px;font-weight:800}
  .panelLink{font-size:12px;color:var(--accent);font-weight:700}
  .chartBox{position:relative;height:240px}
  /* Donut + leyenda */
  .donutWrap{display:flex;align-items:center;gap:18px}
  .donutCanvas{position:relative;width:150px;height:150px;flex-shrink:0}
  .donutCenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;pointer-events:none}
  .donutCenter b{font-size:21px;font-weight:900}
  .donutCenter span{font-size:11px;color:var(--tSecondary)}
  .donutLegend{flex:1;display:flex;flex-direction:column;gap:12px}
  .dlRow{display:flex;align-items:center;gap:8px;font-size:13px}
  .dlDot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .dlLbl{flex:1;font-weight:600}
  .dlPct{font-weight:800}
  .dlCnt{color:var(--tMuted);font-size:11px;width:46px;text-align:right}
  /* Viajes recientes (estilo referencia) */
  .rrow{display:flex;align-items:center;gap:10px;padding:11px 0}
  .rrow+.rrow{border-top:1px solid var(--border)}
  .rinfo{flex:1;min-width:0}
  .rname{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rid{font-size:11px;color:var(--tMuted);margin-top:2px}
  .rtime{font-size:11px;color:var(--tSecondary);white-space:nowrap}
  .rright{text-align:right;flex-shrink:0}
  .ramt{font-size:13px;font-weight:800}
  .rpay{font-size:10px;color:var(--tMuted)}
  @media(max-width:560px){.rtime{display:none}}
  /* Suscripciones */
  .navNuevo{margin-left:auto;background:#8B5CF6;color:#fff;border-radius:6px;padding:1px 6px;font-size:9px;font-weight:800}
  .planBadge{border-radius:8px;padding:3px 10px;font-size:11px;font-weight:800}
  .estadoSub{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700}
  .tablaWrap{overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2px 10px}
  table.subs{width:100%;border-collapse:collapse;min-width:780px}
  table.subs th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--tMuted);
    text-align:left;padding:13px 10px;font-weight:700;border-bottom:1px solid var(--border)}
  table.subs td{padding:12px 10px;font-size:13px;border-bottom:1px solid var(--border);white-space:nowrap}
  table.subs tr:last-child td{border-bottom:none}
  .tdCond{display:flex;align-items:center;gap:10px}
  .tdCond .nm{font-weight:700}
  .tdCond .id{font-size:11px;color:var(--tMuted)}
  .verBtn{border:1px solid var(--accent);color:var(--accent);border-radius:9px;padding:6px 12px;
    font-size:12px;font-weight:700;background:#2563EB0D}
  .planGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .planCard{position:relative;background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:18px;display:flex;flex-direction:column;gap:10px}
  .planCard.pop{border-color:#8B5CF6;box-shadow:0 0 0 1px #8B5CF6}
  .planPopTag{position:absolute;top:-10px;right:14px;background:#8B5CF6;color:#fff;border-radius:8px;
    padding:2px 10px;font-size:10px;font-weight:800}
  .planIco{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .planNom{font-size:16px;font-weight:800}
  .planDesc{font-size:12px;color:var(--tSecondary)}
  .planPrecio{font-size:24px;font-weight:900}
  .planPrecio small{font-size:12px;color:var(--tMuted);font-weight:600}
  .planFeat{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--tSecondary)}
  .planFeat b{color:var(--green)}
  .planCount{margin-top:auto;font-size:12px;color:var(--tSecondary);font-weight:700;
    background:var(--bg);border-radius:10px;padding:8px;text-align:center}
  .txRow{display:flex;align-items:center;gap:10px;padding:11px 0}
  .txRow+.txRow{border-top:1px solid var(--border)}
  .txInfo{flex:1;min-width:0}
  .txN{font-size:13px;font-weight:700}
  .txP{font-size:11px;color:var(--tMuted)}
  .txRight{text-align:right}
  .txAmt{font-size:13px;font-weight:800}
  .planPickList{display:flex;flex-direction:column;gap:10px;margin:12px 0}
  .planPick{display:flex;align-items:center;gap:12px;border:1px solid var(--border);border-radius:12px;
    padding:12px;width:100%;text-align:left;background:var(--card)}
  .planPick:hover{border-color:var(--accent)}
  .planPickIcon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .planPickName{font-weight:800;flex:1}
  .planPickPrice{font-weight:800;color:var(--accent)}
  @media(max-width:760px){.planGrid{grid-template-columns:1fr}}

  /* Lista compacta (recientes, activos, pendientes) */
  .rowList{display:flex;flex-direction:column}
  .lrow{display:flex;align-items:center;gap:10px;padding:10px 0;width:100%;text-align:left}
  .lrow+.lrow{border-top:1px solid var(--border)}
  .lrow .info{flex:1;min-width:0}
  .lrow .t1{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lrow .t2{font-size:11px;color:var(--tSecondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lrow .amt{font-size:13px;font-weight:800;color:var(--tPrimary)}
  .star{font-size:12px;color:var(--amber);font-weight:700}

  /* Cards genéricas */
  .avatar{width:40px;height:40px;border-radius:50%;background:#2563EB22;color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;
    object-fit:cover;flex-shrink:0}
  .badge{border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;white-space:nowrap}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .chev{font-size:20px;color:var(--tMuted)}
  .empty{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;
    text-align:center;font-size:13px;color:var(--tSecondary)}
  .soonBox{background:var(--card);border:1px dashed var(--border);border-radius:16px;padding:48px 24px;
    text-align:center;color:var(--tSecondary)}
  .soonBox .em{font-size:40px}
  .soonBox .t{font-size:16px;font-weight:800;color:var(--tPrimary);margin-top:8px}
  .soonBox .d{font-size:13px;margin-top:4px}

  /* User row (listas usuarios/solicitudes) */
  .fila{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);
    border-radius:14px;padding:12px;width:100%;text-align:left;margin-bottom:8px}
  .filaInfo{flex:1;min-width:0}
  .filaNombre{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .filaMeta{font-size:12px;color:var(--tSecondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Segmented + search */
  .segmented{display:flex;background:var(--muted);border-radius:12px;padding:4px;gap:4px;max-width:360px}
  .segment{flex:1;padding:9px 0;border-radius:9px;font-size:13px;font-weight:600;color:var(--tSecondary)}
  .segment.active{background:var(--card);color:var(--tPrimary);font-weight:800;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
    border-radius:12px;padding:0 12px;height:44px;margin:10px 0}
  .search input{flex:1;border:none;outline:none;font-size:14px;background:none;color:var(--tPrimary)}

  .actCard{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);
    border-radius:14px;padding:14px;margin-bottom:8px}
  .actMain{flex:1;min-width:0}
  .actTitle{font-size:14px;font-weight:700}
  .actMeta{font-size:12px;color:var(--tSecondary);margin-top:3px}
  .itemCard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;
    display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
  .cancelHeader{display:flex;justify-content:space-between;align-items:center}
  .trash{padding:6px;font-size:15px;background:none}

  /* Modal */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;
    justify-content:center;z-index:50;padding:16px}
  .sheet{background:var(--bg);border-radius:20px;padding:18px;width:100%;max-width:520px;
    max-height:92vh;overflow-y:auto}
  .modalTop{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .modalName{font-size:18px;font-weight:800}
  .modalRole{font-size:12px;color:var(--tSecondary);margin-top:2px}
  .fotosRow{display:flex;gap:10px;margin-bottom:10px}
  .foto{flex:1;text-align:center}
  .foto .img{width:100%;height:84px;border-radius:12px;object-fit:cover;background:var(--muted);
    display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--border)}
  .foto .perfilImg{width:70px;height:70px;border-radius:50%;margin:0 auto;object-fit:cover;
    border:2px solid #2563EB44;background:var(--muted);display:flex;align-items:center;justify-content:center;font-size:22px}
  .foto .lbl{font-size:10px;color:var(--tSecondary);font-weight:600;margin-top:4px}
  .datos{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:0 14px;margin-bottom:14px}
  .datoRow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0}
  .datoRow+.datoRow{border-top:1px solid var(--border)}
  .datoK{font-size:12px;color:var(--tMuted);font-weight:700}
  .datoV{flex:1;font-size:13px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .acciones{display:flex;flex-wrap:wrap;gap:8px}
  .accionBtn{flex:1 1 46%;min-width:120px;border:1px solid;border-radius:12px;padding:12px;
    font-size:14px;font-weight:700;text-align:center}
  .bAprobar{background:#22C55E18;border-color:#22C55E55;color:var(--green)}
  .bRechazar{background:#EF444414;border-color:#EF444444;color:var(--red)}
  .bRenovar{background:#2563EB14;border-color:#2563EB55;color:var(--accent)}
  .bCambiar{background:#8B5CF614;border-color:#8B5CF655;color:#8B5CF6}
  .bSuspender{background:#2563EB14;border-color:#2563EB44;color:var(--blue)}
  .bEliminar{background:#EF444414;border-color:#EF444444;color:var(--red)}
  .cerrar{margin-top:14px;padding:14px;width:100%;text-align:center;font-size:14px;
    font-weight:700;color:var(--tSecondary)}
  .loading{padding:60px;text-align:center;color:var(--tSecondary)}

  /* Chat de soporte */
  .chatSheet{display:flex;flex-direction:column;max-width:560px;height:80vh;padding:0}
  .chatHead{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
  .chatBody{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}
  .chatRow{display:flex}
  .chatRow.izq{justify-content:flex-start}
  .chatRow.der{justify-content:flex-end}
  .chatBubble{max-width:78%;border-radius:14px;padding:9px 12px;font-size:14px;line-height:1.35;position:relative}
  .chatBubble.otro{background:var(--card);border:1px solid var(--border);border-top-left-radius:4px;color:var(--tPrimary)}
  .chatBubble.mio{background:var(--accent);color:#fff;border-top-right-radius:4px}
  .chatHora{display:block;font-size:10px;opacity:.7;text-align:right;margin-top:3px}
  .chatInputRow{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:var(--card)}
  .chatInput{flex:1;border:1px solid var(--border);border-radius:12px;padding:11px 14px;font-size:14px;outline:none;background:var(--bg);color:var(--tPrimary)}
  .chatSend{width:46px;border-radius:12px;background:var(--accent);color:#fff;font-size:18px;font-weight:800}

  @media(max-width:900px){
    .sidebar{transform:translateX(-100%)}
    .sidebar.open{transform:none}
    .main{margin-left:0}
    .hamb{display:flex}
    .kpiGrid{grid-template-columns:repeat(2,1fr)}
    .dashGrid,.dashGrid2{grid-template-columns:1fr}
    .content{padding:14px 16px 48px}
    .topbar{padding:16px}
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="iconBox">🔐</div>
  <h1>Panel Admin</h1>
  <div class="sub">RUTAEXPRESS · MONTALVO</div>
  <input id="pwd" type="password" placeholder="Contraseña del administrador" autocomplete="current-password" />
  <button id="loginBtn">Entrar →</button>
  <div class="hint">Solo el administrador de RutaExpress tiene acceso</div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hidden">
  <div class="layout">
    <div class="overlay" id="overlay" onclick="toggleSidebar(false)"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sbBrand">
        <div class="logo">R</div>
        <div><div class="name">RutaExpress</div><div class="tag">PANEL ADMIN · MONTALVO</div></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sbUser">
        <div class="av">A</div>
        <div><div class="un">Admin</div><div class="ur">Administrador</div></div>
        <button class="out" id="logoutBtn" title="Salir">⎋</button>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="hamb" onclick="toggleSidebar()">☰</button>
          <div><h2 id="pageTitle">Dashboard</h2><div class="sub">Bienvenido, Admin 👋</div></div>
        </div>
        <div class="dateChip">📅 <span id="hoyChip"></span></div>
      </div>
      <div class="content" id="content"></div>
    </main>
  </div>
</div>

<div id="modalRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

let _rtSoporte = null;
function entrar(){
  $('login').classList.add('hidden'); $('app').classList.remove('hidden'); $('hoyChip').textContent = fechaEC(Date.now()); cargarTodo();
  // Realtime: mensajes de soporte nuevos llegan al instante.

// --- datos --- (bajo volumen: se carga todo y se deriva en cliente)
async function cargarTodo(){
  cargando = true; render();
  const [c,p,v,can,pg,sop] = await Promise.all([
    sb.from('conductores').select('*').order('fecha_registro',{ascending:false}),
    sb.from('pasajeros').select('*').order('fecha_registro',{ascending:false}),
    sb.from('viajes').select('id,origen,destino,fecha_hora,tarifa,estado,conductor_id,pasajero_id,calificacion_conductor').order('fecha_hora',{ascending:false}),
    sb.from('cancelaciones').select('*, viaje:viajes(origen,destino)').order('fecha_hora',{ascending:false}).limit(100),
    sb.from('pagos_suscripcion').select('*').order('fecha',{ascending:false}).limit(300),
    sb.from('soporte_mensajes').select('*').order('fecha',{ascending:true}),
  ]);
  conductores = c.data || []; pasajeros = p.data || []; viajes = v.data || []; cancelaciones = can.data || []; pagos = pg.data || []; soporte = sop.data || [];
  const cc = {}, pp = {}, rt = {};
  const sumar = (m,id,e) => { if(!id)return; m[id]=m[id]||{total:0,completados:0}; m[id].total++; if(e==='COMPLETADO')m[id].completados++; };
  viajes.forEach(x => {
    sumar(cc,x.conductor_id,x.estado); sumar(pp,x.pasajero_id,x.estado);
    if (x.conductor_id && x.calificacion_conductor != null){ rt[x.conductor_id]=rt[x.conductor_id]||{s:0,n:0}; rt[x.conductor_id].s+=x.calificacion_conductor; rt[x.conductor_id].n++; }
  });
  stats = {conductor:cc, pasajero:pp}; ratings = rt;
  cargando = false; render();
}

// --- acciones ---
function sumarUnMes(desde){
  const base = desde && new Date(desde) > new Date() ? new Date(desde) : new Date();
  base.setMonth(base.getMonth()+1); return base;
}
async function cambiarEstadoConductor(c, estado){
  const msg = {APROBADO:`¿Aprobar a ${c.nombre_completo}? Se activa 1 mes de servicio.`,
    RECHAZADO:`¿Rechazar a ${c.nombre_completo}?`, SUSPENDIDO:`¿Suspender a ${c.nombre_completo}?`}[estado];
  if (!confirm(msg)) return;
  const {error} = await sb.from('conductores').update({
    estado, verificado: estado==='APROBADO',
    fecha_aprobacion: estado==='APROBADO' ? new Date().toISOString() : null,
    ...(estado==='APROBADO' ? {suscripcion_inicio: new Date().toISOString(), suscripcion_vence: sumarUnMes().toISOString()} : {}),
  }).eq('id', c.id);
  if (error) alert('No se pudo actualizar el estado'); else { cerrarModal(); cargarTodo(); }
}
async function cambiarEstadoPasajero(p, estado){
  if (!confirm(`¿Cambiar estado de ${p.nombre_completo} a ${estado}?`)) return;
  const {error} = await sb.from('pasajeros').update({
    estado, verificado: estado==='APROBADO',
    fecha_aprobacion: estado==='APROBADO' ? new Date().toISOString() : null,
  }).eq('id', p.id);
  if (!error) { cerrarModal(); cargarTodo(); }
}
async function eliminar(id, tabla){
  if (!confirm('¿Estás seguro? Esta acción no se puede deshacer.')) return;
  const {error} = await sb.from(tabla).delete().eq('id', id);
  if (error) alert('No se pudo eliminar: ' + error.message); else { cerrarModal(); cargarTodo(); }
}

// --- helpers ---
function infoSuscripcion(vence){
  if (!vence) return null;
  const dias = Math.ceil((new Date(vence) - new Date()) / DIA);
  if (dias < 0) return {dias, texto:`Vencida hace ${-dias}d`, color:'var(--red)', vencida:true};
  if (dias <= 3) return {dias, texto: dias===0?'Vence hoy':`Vence en ${dias}d`, color:'var(--orange)', porVencer:true};
  return {dias, texto:`Vence en ${dias}d`, color:'var(--green)'};
}
const estadoColor = e => ({APROBADO:'var(--green)',RECHAZADO:'var(--red)',SUSPENDIDO:'var(--blue)',PENDIENTE:'var(--orange)'}[e]||'var(--tSecondary)');
const viajeColor = e => ({COMPLETADO:'var(--green)','EN CURSO':'var(--blue)',SOLICITADO:'var(--orange)',CANCELADO:'var(--red)'}[e]||'var(--tSecondary)');
const countViajes = (dias,estado) => viajes.filter(v => (!estado||v.estado===estado) && Date.now()-new Date(v.fecha_hora).getTime() <= dias*DIA).length;
const countCancel = dias => cancelaciones.filter(c => Date.now()-new Date(c.fecha_hora).getTime() <= dias*DIA).length;
const nombreCond = id => conductores.find(c=>c.id===id)?.nombre_completo || '—';
const nombrePas = id => pasajeros.find(p=>p.id===id)?.nombre_completo || '—';
const ratingCond = id => { const r=ratings[id]; return r&&r.n?(r.s/r.n).toFixed(1):null; };

const coincide = u => {
  const q = busqueda.trim().toLowerCase();
  if (!q) return true;
  return [u.nombre_completo,u.cedula,u.placa,u.email].filter(Boolean).some(x => String(x).toLowerCase().includes(q));
};

// métricas de una ventana semanal (off=0 últimos 7 días, off=1 semana previa)
function metricasSemana(off){
  const hasta = Date.now() - off*7*DIA, desde = hasta - 7*DIA;
  const vs = viajes.filter(v => { const t=new Date(v.fecha_hora).getTime(); return t>desde && t<=hasta; });
  return {
    viajes: vs.length,
    usuarios: new Set(vs.map(v=>v.pasajero_id).filter(Boolean)).size,
    conductores: new Set(vs.map(v=>v.conductor_id).filter(Boolean)).size,
    ingresos: vs.filter(v=>v.estado==='COMPLETADO').reduce((s,v)=>s+Number(v.tarifa||0),0),
  };
}
function delta(act, prev){
  if (prev === 0) return act>0 ? {pct:'100.0', up:true} : null;
  const d = (act-prev)/prev*100;
  return {pct:Math.abs(d).toFixed(1), up:d>=0};
}
function cuando(d){
  const f=new Date(d), h=new Date(), t=f.toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'});
  return f.toDateString()===h.toDateString() ? ('Hoy, '+t)
    : (f.toLocaleDateString('es-EC',{day:'2-digit',month:'short'})+', '+t);
}
const estadoBonito = e => ({COMPLETADO:'Completado','EN CURSO':'En curso',SOLICITADO:'Solicitado',CANCELADO:'Cancelado'}[e]||e);
const badgeViaje = e => ({COMPLETADO:'var(--green)','EN CURSO':'var(--blue)',SOLICITADO:'var(--orange)',CANCELADO:'var(--orange)'}[e]||'var(--tSecondary)');

// serie de los últimos n días: completados vs cancelados
function serieDias(n){
  const labels=[], comp=[], canc=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date(Date.now()-i*DIA), key=d.toDateString();
    labels.push(d.toLocaleDateString('es-EC',{day:'2-digit',month:'2-digit'}));
    comp.push(viajes.filter(v=>v.estado==='COMPLETADO'&&new Date(v.fecha_hora).toDateString()===key).length);
    canc.push(viajes.filter(v=>v.estado==='CANCELADO'&&new Date(v.fecha_hora).toDateString()===key).length);
  }
  return {labels,comp,canc};
}

function kpiCard(icon,bg,color,val,lbl,d){
  const dh = d
    ? `<div class="kpiDelta ${d.up?'up':'down'}">${d.up?'▲':'▼'} ${d.pct}% <span>vs sem. anterior</span></div>`
    : `<div class="kpiDelta muted">Sin datos previos</div>`;
  return `<div class="kpiCard">
    <div class="kpiIcon" style="background:${bg};color:${color}">${icon}</div>
    <div style="flex:1;min-width:0"><div class="kpiLbl">${lbl}</div><div class="kpiVal">${val}</div>${dh}</div>
  </div>`;
}

// --- render principal ---
function render(){
  if (_line){ _line.destroy(); _line=null; }
  if (_donut){ _donut.destroy(); _donut=null; }
  if (_ingresos){ _ingresos.destroy(); _ingresos=null; }

  const pendC = conductores.filter(c=>c.estado==='PENDIENTE');
  const pendP = pasajeros.filter(p=>p.estado==='PENDIENTE');
  const pendTotal = pendC.length + pendP.length;

  // sidebar
  const soporteNoLeidos = new Set(soporte.filter(m => m.remitente!=='admin' && !m.leido_admin).map(m => m.pasajero_id?'p:'+m.pasajero_id:'c:'+m.conductor_id)).size;
  $('nav').innerHTML = NAV.map(n => n.soon
    ? `<div class="navItem soon"><span class="ic">${n.ic}</span>${n.l}<span class="soonTag">Pronto</span></div>`
    : `<button class="navItem ${tab===n.k?'active':''}" onclick="irTab('${n.k}')">
        <span class="ic">${n.ic}</span>${n.l}
        ${n.badge&&pendTotal?`<span class="navBadge">${pendTotal}</span>`:''}
        ${n.badgeSoporte&&soporteNoLeidos?`<span class="navBadge">${soporteNoLeidos}</span>`:''}
        ${n.nuevo?`<span class="navNuevo">Nuevo</span>`:''}</button>`
  ).join('');
  $('pageTitle').textContent = (NAV.find(n=>n.k===tab)?.titulo) || 'Dashboard';

  if (cargando) { $('content').innerHTML = `<div class="loading">Cargando…</div>`; return; }
  let h = '';

  if (tab === 'dashboard') h = vistaDashboard(pendC, pendP, pendTotal);
  else if (tab === 'solicitudes') h = vistaSolicitudes(pendC, pendP, pendTotal);
  else if (tab === 'suscripciones') h = vistaSuscripciones();
  else if (tab === 'soporte') h = vistaSoporte();
  else if (tab === 'conductores' || tab === 'pasajeros') h = vistaUsuarios();
  else if (tab === 'viajes') h = vistaViajes();
  else if (tab === 'cancelaciones') h = vistaCancelaciones();
  else h = vistaProximamente();

  $('content').innerHTML = h;

  if (tab === 'dashboard') dibujarGraficos();
  if (tab === 'suscripciones') dibujarIngresos();
  const bi = $('buscar');
  if (bi) bi.oninput = e => { busqueda = e.target.value; const pos = e.target.selectionStart; render(); const n=$('buscar'); if(n){n.focus(); n.setSelectionRange(pos,pos);} };
}

function vistaDashboard(pendC, pendP, pendTotal){
  const ingresos = viajes.filter(v=>v.estado==='COMPLETADO').reduce((s,v)=>s+Number(v.tarifa||0),0);
  const condActivos = conductores.filter(c=>c.estado==='APROBADO');
  const pasActivos = pasajeros.filter(p=>p.estado==='APROBADO');
  const sA = metricasSemana(0), sB = metricasSemana(1);

  let h = `<div class="kpiGrid">
    ${kpiCard('🚗','#2563EB1A','#2563EB', viajes.length.toLocaleString('es-EC'), 'Viajes totales', delta(sA.viajes,sB.viajes))}
    ${kpiCard('👥','#22C55E1A','#16A34A', pasActivos.length.toLocaleString('es-EC'), 'Usuarios activos', delta(sA.usuarios,sB.usuarios))}
    ${kpiCard('🪪','#6366F11A','#6366F1', condActivos.length.toLocaleString('es-EC'), 'Conductores activos', delta(sA.conductores,sB.conductores))}
    ${kpiCard('💵','#F59E0B1A','#D97706', fmtMoney(ingresos), 'Ingresos en efectivo', delta(sA.ingresos,sB.ingresos))}
  </div>`;

  // línea + viajes recientes (estilo referencia)
  const recientes = viajes.slice(0,6).map(v => {
    const col = badgeViaje(v.estado);
    return `<div class="rrow">
      ${avatar(null, nombrePas(v.pasajero_id), 34)}
      <div class="rinfo"><div class="rname">${esc(nombrePas(v.pasajero_id))}</div>
        <div class="rid">ID: #${esc(String(v.id).slice(0,6).toUpperCase())}</div></div>
      <span class="badge" style="background:${col}1A;color:${col}">${esc(estadoBonito(v.estado))}</span>
      <div class="rtime">${esc(cuando(v.fecha_hora))}</div>
      <div class="rright"><div class="ramt">${fmtMoney(v.tarifa)}</div><div class="rpay">Efectivo</div></div>
    </div>`;
  }).join('') || `<div class="empty" style="border:none">Aún no hay viajes</div>`;

  h += `<div class="dashGrid">
    <div class="panel">
      <div class="panelHead"><div class="panelTitle">Viajes</div>
        <div class="actMeta">Últimos 14 días</div></div>
      <div class="chartBox"><canvas id="cLinea"></canvas></div>
    </div>
    <div class="panel">
      <div class="panelHead"><div class="panelTitle">Viajes recientes</div>
        <button class="panelLink" onclick="irTab('viajes')">Ver todos</button></div>
      <div class="rowList">${recientes}</div>
    </div>
  </div>`;

  // distribución (dona) + conductores activos + solicitudes
  const activos = condActivos
    .map(c => ({c, n: (stats.conductor[c.id]?.completados)||0, r: ratingCond(c.id)}))
    .sort((a,b)=>b.n-a.n).slice(0,5)
    .map(({c,n,r}) => `<button class="lrow" onclick="abrirDetalle('${c.id}','conductor')">
      ${avatar(c.foto_perfil_url, c.nombre_completo, 36)}
      <div class="info"><div class="t1">${esc(c.nombre_completo)}</div>
        <div class="t2">${n} ${n===1?'viaje':'viajes'} · ${esc(c.placa||'—')}</div></div>
      ${r?`<span class="star">⭐ ${r}</span>`:''}
    </button>`).join('') || `<div class="empty" style="border:none">Sin conductores activos</div>`;

  let pend = '';
  if (!pendTotal) pend = `<div class="empty" style="border:none">Sin pendientes 🎉</div>`;
  else pend = [...pendC.map(c=>({u:c,t:'conductor'})), ...pendP.map(p=>({u:p,t:'pasajero'}))].slice(0,5)
    .map(({u,t}) => `<button class="lrow" onclick="abrirDetalle('${u.id}','${t}')">
      ${avatar(u.foto_perfil_url, u.nombre_completo, 36)}
      <div class="info"><div class="t1">${esc(u.nombre_completo)}</div>
        <div class="t2">${t==='conductor'?'Conductor':'Pasajero'} · ${esc(u.cedula||'—')}</div></div>
      <span class="badge" style="background:#FF8A001A;color:var(--orange)">Pendiente</span>
    </button>`).join('');

  const dComp = viajes.filter(v=>v.estado==='COMPLETADO').length;
  const dCanc = viajes.filter(v=>v.estado==='CANCELADO').length;
  const dProg = viajes.filter(v=>v.estado==='EN CURSO'||v.estado==='SOLICITADO').length;
  const dTot = dComp+dCanc+dProg;
  window._dona = {comp:dComp, canc:dCanc, prog:dProg};
  const pctD = n => dTot ? Math.round(n/dTot*100) : 0;
  const legenda = [['Completados','#2563EB',dComp],['Cancelados','#FF8A00',dCanc],['En progreso','#94A3B8',dProg]]
    .map(([l,c,n]) => `<div class="dlRow"><span class="dlDot" style="background:${c}"></span>
      <span class="dlLbl">${l}</span><span class="dlPct">${pctD(n)}%</span><span class="dlCnt">(${n})</span></div>`).join('');

  h += `<div class="dashGrid2">
    <div class="panel">
      <div class="panelHead"><div class="panelTitle">Distribución de viajes</div></div>
      <div class="donutWrap">
        <div class="donutCanvas"><canvas id="cDona"></canvas>
          <div class="donutCenter"><b>${dTot.toLocaleString('es-EC')}</b><span>Total</span></div></div>
        <div class="donutLegend">${legenda}</div>
      </div>
    </div>
    <div class="panel">
      <div class="panelHead"><div class="panelTitle">Conductores activos</div>
        <button class="panelLink" onclick="irTab('conductores')">Ver todos</button></div>
      <div class="rowList">${activos}</div>
    </div>
    <div class="panel">
      <div class="panelHead"><div class="panelTitle">Solicitudes pendientes</div>
        ${pendTotal?`<button class="panelLink" onclick="irTab('solicitudes')">Revisar</button>`:''}</div>
      <div class="rowList">${pend}</div>
    </div>
  </div>`;
  return h;
}

function dibujarGraficos(){
  const ctxL = $('cLinea'), ctxD = $('cDona');
  if (ctxL){
    const s = serieDias(14);
    _line = new Chart(ctxL, {
      type:'line',
      data:{labels:s.labels, datasets:[
        {label:'Completados', data:s.comp, borderColor:'#2563EB', backgroundColor:'#2563EB22',
          tension:.35, fill:true, pointRadius:2},
        {label:'Cancelados', data:s.canc, borderColor:'#EF4444', backgroundColor:'#EF444411',
          tension:.35, fill:true, pointRadius:2},
      ]},
      options:{responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:true, position:'bottom', labels:{boxWidth:10, font:{size:11}}}},
        scales:{y:{beginAtZero:true, ticks:{precision:0}}, x:{ticks:{maxRotation:0, autoSkip:true, maxTicksLimit:7, font:{size:10}}}}}
    });
  }
  if (ctxD){
    const d = window._dona || {comp:0,canc:0,prog:0};
    _donut = new Chart(ctxD, {
      type:'doughnut',
      data:{labels:['Completados','Cancelados','En progreso'],

const fechaCorta = d => new Date(d).toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'});

function vistaSuscripciones(){
  const activos = conductores.filter(c=>c.estado==='APROBADO');
  const activas = activos.filter(c=>{const s=infoSuscripcion(c.suscripcion_vence); return s && !s.vencida;});
  const porVencer = activos.filter(c=>{const s=infoSuscripcion(c.suscripcion_vence); return s && s.porVencer;});
  const conPlan = activos.filter(c=>c.plan);
  const pagosOk = pagos.filter(p=>p.estado==='PAGADO');
  const ventana = (arr,campo,off)=>{const hasta=Date.now()-off*7*DIA, desde=hasta-7*DIA;
    return arr.filter(x=>{const t=new Date(x[campo]).getTime(); return t>desde && t<=hasta;});};
  const ing30 = pagosOk.filter(p=>Date.now()-new Date(p.fecha).getTime()<=30*DIA).reduce((s,p)=>s+Number(p.monto||0),0);
  const sumar = a => a.reduce((s,p)=>s+Number(p.monto||0),0);
  const dIng = delta(sumar(ventana(pagosOk,'fecha',0)), sumar(ventana(pagosOk,'fecha',1)));
  const dAct = delta(ventana(activos,'suscripcion_inicio',0).length, ventana(activos,'suscripcion_inicio',1).length);

  let h = `<div class="kpiGrid">
    ${kpiCard('🎫','#2563EB1A','#2563EB', activas.length.toLocaleString('es-EC'), 'Suscripciones activas', dAct)}
    ${kpiCard('💵','#22C55E1A','#16A34A', fmtMoney(ing30), 'Ingresos (30 días)', dIng)}
    ${kpiCard('🪪','#8B5CF61A','#8B5CF6', conPlan.length.toLocaleString('es-EC'), 'Conductores con plan', dAct)}
    <div class="kpiCard"><div class="kpiIcon" style="background:#F59E0B1A;color:#D97706">⏳</div>
      <div style="flex:1"><div class="kpiLbl">Próximos a vencer</div><div class="kpiVal">${porVencer.length}</div>
      <div class="kpiDelta" style="color:#D97706">Vigilar renovaciones</div></div></div>
  </div>`;

  // tabla de suscripciones
  const filas = activos.slice().sort((a,b)=> new Date(a.suscripcion_vence||0) - new Date(b.suscripcion_vence||0)).map(c=>{
    const s=infoSuscripcion(c.suscripcion_vence), pl=planInfo(c.plan);
    const est = !s ? {t:'Sin datos',c:'var(--tMuted)'} : s.vencida ? {t:'Vencida',c:'var(--red)'}
      : s.porVencer ? {t:'Próxima a vencer',c:'var(--orange)'} : {t:'Activa',c:'var(--green)'};
    const prox = !s||s.vencida ? '—' : (fechaCorta(c.suscripcion_vence) + (s.dias===0?' (Hoy)':''));
    return `<tr>
      <td><div class="tdCond">${avatar(c.foto_perfil_url,c.nombre_completo,34)}
        <div><div class="nm">${esc(c.nombre_completo)}</div><div class="id">ID: #COND-${esc(String(c.id).slice(0,4).toUpperCase())}</div></div></div></td>
      <td>${pl?`<span class="planBadge" style="background:${pl.color}1A;color:${pl.color}">${pl.nombre}</span>`:'—'}</td>
      <td><span class="estadoSub" style="color:${est.c}">● ${est.t}</span></td>
      <td>${c.suscripcion_inicio?fechaCorta(c.suscripcion_inicio):'—'}</td>
      <td>${c.suscripcion_vence?fechaCorta(c.suscripcion_vence):'—'}</td>
      <td style="${s&&s.dias===0?'color:var(--orange);font-weight:700':''}">${prox}</td>
      <td style="font-weight:800">${pl?fmtMoney(pl.precio):'—'}</td>
      <td><button class="verBtn" onclick="abrirDetalle('${c.id}','conductor')">Ver detalles</button></td>
    </tr>`;
  }).join('');
  h += `<div class="tablaWrap"><table class="subs">
    <thead><tr><th>Conductor</th><th>Plan</th><th>Estado</th><th>Inicio</th><th>Vencimiento</th><th>Próximo pago</th><th>Monto</th><th>Acciones</th></tr></thead>
    <tbody>${filas || `<tr><td colspan="8" style="text-align:center;color:var(--tSecondary);padding:24px">No hay conductores aprobados</td></tr>`}</tbody>
  </table></div>`;

  // tarjetas de planes
  const planCards = Object.entries(PLANES).map(([k,p])=>{
    const n = activos.filter(c=>c.plan===k).length;
    return `<div class="planCard ${p.popular?'pop':''}">
      ${p.popular?`<span class="planPopTag">Más popular</span>`:''}
      <div class="planIco" style="background:${p.color}1A;color:${p.color}">${p.icon}</div>
      <div><div class="planNom">${p.nombre}</div><div class="planDesc">${p.desc}</div></div>
      <div class="planPrecio">${fmtMoney(p.precio)}<small>/mes</small></div>
      <div style="display:flex;flex-direction:column;gap:7px">${p.features.map(f=>`<div class="planFeat"><b>✓</b> ${f}</div>`).join('')}</div>
      <div class="planCount">${n} ${n===1?'conductor':'conductores'} en este plan</div>
    </div>`;
  }).join('');
  h += `<div class="panelHead" style="margin-top:8px"><div class="panelTitle">Planes de suscripción</div></div>
    <div class="planGrid">${planCards}</div>`;

  // ingresos + transacciones
  const txs = pagos.slice(0,6).map(p=>{
    const c = conductores.find(x=>x.id===p.conductor_id), pl = planInfo(p.plan);
    const ec = {PAGADO:'var(--green)',PENDIENTE:'var(--orange)',FALLIDO:'var(--red)'}[p.estado]||'var(--tSecondary)';
    const et = {PAGADO:'Pagado',PENDIENTE:'Pendiente',FALLIDO:'Fallido'}[p.estado]||p.estado;
    return `<div class="txRow">${avatar(c&&c.foto_perfil_url, c?c.nombre_completo:'?',34)}
      <div class="txInfo"><div class="txN">${esc(c?c.nombre_completo:'Conductor')}</div>
        <div class="txP">${pl?'Plan '+pl.nombre:'—'} · ${esc(cuando(p.fecha))}</div></div>
      <div class="txRight"><div class="txAmt">${fmtMoney(p.monto)}</div>
        <span class="badge" style="background:${ec}1A;color:${ec};font-size:10px">${et}</span></div>
    </div>`;
  }).join('') || `<div class="empty" style="border:none">Aún no hay transacciones</div>`;

  h += `<div class="dashGrid">
    <div class="panel"><div class="panelHead"><div class="panelTitle">Resumen de ingresos</div><div class="actMeta">Últimos 30 días</div></div>
      <div style="font-size:22px;font-weight:900">${fmtMoney(ing30)}
        ${dIng?`<span class="kpiDelta ${dIng.up?'up':'down'}" style="display:inline-flex">${dIng.up?'▲':'▼'} ${dIng.pct}%</span>`:''}</div>
      <div class="chartBox" style="height:200px;margin-top:8px"><canvas id="cIngresos"></canvas></div></div>
    <div class="panel"><div class="panelHead"><div class="panelTitle">Transacciones recientes</div></div>
      <div class="rowList">${txs}</div></div>
  </div>`;
  return h;
}

  const c = conductores.find(x=>x.id===cid); if(!c) return;

    <button class="planPick" onclick="ejecutarPlan('${cid}','${k}','${modo}')">

    </button>`).join('');
  const titulo = modo==='aprobar' ? 'Aprobar y asignar plan' : modo==='cambiar' ? 'Cambiar de plan' : 'Renovar suscripción';
  const sub = modo==='cambiar' ? 'Solo cambia el plan (no modifica fechas ni registra pago)' : 'se registra el pago del plan elegido';
  $('modalRoot').innerHTML = `<div class="backdrop" onclick="if(event.target===this)cerrarModal()"><div class="sheet" style="max-width:420px">
    <div class="modalName">${titulo}</div>

async function ejecutarPlan(cid, planKey, modo){
  const c = conductores.find(x=>x.id===cid); if(!c) return;
  const p = PLANES[planKey];
  // Cambiar de plan: solo actualiza el nivel, sin tocar fechas ni registrar pago.
  if (modo==='cambiar'){
    const {error} = await sb.from('conductores').update({plan:planKey}).eq('id', cid);
    if (error){ alert('No se pudo: '+error.message); return; }
    cerrarModal(); cargarTodo();
    return;
  }
  const venceBase = modo==='renovar' ? c.suscripcion_vence : null;
  const upd = {plan:planKey, suscripcion_inicio:new Date().toISOString(), suscripcion_vence:sumarUnMes(venceBase).toISOString()};
  if (modo==='aprobar'){ upd.estado='APROBADO'; upd.verificado=true; upd.fecha_aprobacion=new Date().toISOString(); }
  const {error} = await sb.from('conductores').update(upd).eq('id', cid);
  if (error){ alert('No se pudo: '+error.message); return; }
  const {error:e2} = await sb.from('pagos_suscripcion').insert({conductor_id:cid, plan:planKey, monto:p.precio, estado:'PAGADO'});
  if (e2) alert('Suscripción actualizada, pero el pago no se registró: '+e2.message);
  cerrarModal(); cargarTodo();
}

const horaCorta = d => {
  const f=new Date(d), h=new Date(), t=f.toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'});
  return f.toDateString()===h.toDateString() ? t : f.toLocaleDateString('es-EC',{day:'2-digit',month:'short'});
};

// --- Soporte: una conversación por usuario (conductor o pasajero) ---
function vistaSoporte(){
  const grupos = {};
  soporte.forEach(m => {
    const tipo = m.pasajero_id ? 'pasajero' : 'conductor';
    const id = m.pasajero_id || m.conductor_id;
    if (!id) return;
    (grupos[tipo+':'+id] = grupos[tipo+':'+id] || {tipo, id, msgs:[]}).msgs.push(m);
  });
  const convs = Object.values(grupos).map(g => {
    const ultimo = g.msgs[g.msgs.length-1];
    const noLeidos = g.msgs.filter(m => m.remitente!=='admin' && !m.leido_admin).length;
    const persona = (g.tipo==='conductor'?conductores:pasajeros).find(x=>x.id===g.id);
    return { ...g, persona, ultimo, noLeidos };
  }).sort((a,b) => new Date(b.ultimo.fecha) - new Date(a.ultimo.fecha));

  if (!convs.length) return `<div class="empty">No hay conversaciones de soporte todavía 💬</div>`;
  return convs.map(cv => `<button class="fila" onclick="abrirChat('${cv.tipo}','${cv.id}')">
    ${avatar(cv.persona?.foto_perfil_url, cv.persona?.nombre_completo||'?')}
    <div class="filaInfo">
      <div class="filaNombre">${esc(cv.persona?.nombre_completo || (cv.tipo==='conductor'?'Conductor':'Pasajero'))}
        <span style="font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px;margin-left:6px;background:${cv.tipo==='conductor'?'#dbeafe':'#dcfce7'};color:${cv.tipo==='conductor'?'var(--accent)':'var(--green)'}">${cv.tipo==='conductor'?'Conductor':'Pasajero'}</span></div>
      <div class="filaMeta">${cv.ultimo.remitente==='admin'?'Tú: ':''}${esc(cv.ultimo.texto)}</div>
    </div>
    <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <span class="actMeta">${horaCorta(cv.ultimo.fecha)}</span>
      ${cv.noLeidos?`<span class="navBadge">${cv.noLeidos}</span>`:''}
    </div>
  </button>`).join('');
}

async function abrirChat(tipo, id){
  chatAbierto = {tipo, id};
  pintarChat(chatAbierto);
  // Marca como leídos los mensajes del usuario (no los del admin).
  const col = tipo==='pasajero' ? 'pasajero_id' : 'conductor_id';
  const hayNoLeidos = soporte.some(m => m[col]===id && m.remitente===tipo && !m.leido_admin);
  if (hayNoLeidos){
    await sb.from('soporte_mensajes').update({leido_admin:true}).eq(col, id).eq('remitente',tipo).eq('leido_admin', false);
    soporte = soporte.map(m => (m[col]===id && m.remitente===tipo) ? {...m, leido_admin:true} : m);
    if (tab==='soporte') render();
  }
}

function pintarChat(conv){
  const { tipo, id } = conv;
  const col = tipo==='pasajero' ? 'pasajero_id' : 'conductor_id';
  const persona = (tipo==='conductor'?conductores:pasajeros).find(x=>x.id===id);
  const msgs = soporte.filter(m => m[col]===id).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const sub = tipo==='conductor'
    ? (planInfo(persona?.plan)?'Plan '+planInfo(persona.plan).nombre:'Sin plan')
    : 'Pasajero';
  const burbujas = msgs.map(m => `<div class="chatRow ${m.remitente==='admin'?'der':'izq'}">
    <div class="chatBubble ${m.remitente==='admin'?'mio':'otro'}">${esc(m.texto)}<span class="chatHora">${horaCorta(m.fecha)}</span></div>
  </div>`).join('') || `<div class="empty" style="border:none">Sin mensajes aún</div>`;
  $('modalRoot').innerHTML = `<div class="backdrop" onclick="if(event.target===this)cerrarChat()"><div class="sheet chatSheet">
    <div class="chatHead">${avatar(persona?.foto_perfil_url, persona?.nombre_completo||'?',38)}
      <div style="flex:1"><div class="modalName" style="font-size:16px">${esc(persona?.nombre_completo||(tipo==='conductor'?'Conductor':'Pasajero'))}</div>
        <div class="modalRole">${esc(sub)}</div></div>
      <button class="cerrar" style="margin:0;padding:8px 14px;width:auto" onclick="cerrarChat()">Cerrar</button></div>
    <div class="chatBody" id="chatBody">${burbujas}</div>
    <div class="chatInputRow">
      <input id="chatInput" class="chatInput" placeholder="Escribe una respuesta…" autocomplete="off" onkeydown="if(event.key==='Enter')enviarSoporte('${tipo}','${id}')">
      <button class="chatSend" onclick="enviarSoporte('${tipo}','${id}')">➤</button>
    </div>
  </div></div>`;
  const body = $('chatBody'); if (body) body.scrollTop = body.scrollHeight;
  const inp = $('chatInput'); if (inp) inp.focus();
}

async function enviarSoporte(tipo, id){
  const inp = $('chatInput'); const t = (inp?.value||'').trim(); if(!t) return;
  inp.value = '';
  const fila = tipo==='pasajero' ? {pasajero_id:id, remitente:'admin', texto:t} : {conductor_id:id, remitente:'admin', texto:t};
  const { error } = await sb.from('soporte_mensajes').insert(fila);
  if (error){ alert('No se pudo enviar: '+error.message); return; }
  await recargarSoporte();
}

      <div style="flex:1"><div class="modalName">${esc(u.nombre_completo)}</div><div class="modalRole">${esC?'Conductor':'Pasajero'}</div></div>
      <span class="badge" style="background:${estadoColor(u.estado)}1A;color:${estadoColor(u.estado)}">${esc(u.estado)}</span></div>
    <div class="fotosRow">${foto(u.foto_perfil_url,'Perfil','👤',true)}${esC?foto(u.foto_vehiculo_url,'Vehículo','🚗'):''}</div>
    <div class="fotosRow">${foto(front,'Cédula frontal','🪪')}${foto(post,'Cédula posterior','🪪')}</div>
    <div class="datos">
      ${esC?dato('Placa',u.placa):''}
      ${dato('Cédula',u.cedula)}${dato('Email',u.email)}
      ${dato('Registrado',fechaEC(u.fecha_registro))}
      ${dato('Viajes',`${st.completados} completados · ${st.total} en total`)}
      ${esC?dato('Calificación', r?`⭐ ${r}`:'Sin calificaciones'):''}
      ${esC&&planInfo(u.plan)?`<div class="datoRow"><span class="datoK">Plan</span><span class="planBadge" style="background:${planInfo(u.plan).color}1A;color:${planInfo(u.plan).color}">${planInfo(u.plan).nombre} · ${fmtMoney(planInfo(u.plan).precio)}/mes</span></div>`:''}
      ${esC&&s?`<div class="datoRow"><span class="datoK">Suscripción</span><span class="badge" style="background:${s.color}1A;color:${s.color}">${s.texto}</span></div>`:''}
    </div>
    <div class="acciones">${acc}</div>
    <button class="cerrar" onclick="cerrarModal()">Cerrar</button>
  </div></div>`;
}
function cerrarModal(){ $('modalRoot').innerHTML=''; }
</script>
</body>
</html>
